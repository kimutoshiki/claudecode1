<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>有楽自治会 防災マップ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
  <meta name="theme-color" content="#0b5394">
  <meta name="description" content="神奈川県川崎市麻生区 有楽自治会の防災マップ。避難所をオフラインでも確認できます。">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <header class="app-header" role="banner">有楽自治会 防災マップ</header>

  <main id="map-wrap">
    <div id="map" role="application" aria-label="防災マップ"></div>
  </main>

  <nav class="btnbar" role="navigation" aria-label="操作メニュー">
    <button id="btn-locate" type="button" aria-label="現在地を地図に表示">
      <span class="btn-icon" aria-hidden="true">📍</span>現在地
    </button>
    <button id="btn-nearest" type="button" aria-label="近くの避難所を探す">
      <span class="btn-icon" aria-hidden="true">🏫</span>近くの避難所
    </button>
    <button id="btn-hazard" type="button" aria-label="ハザード表示を切り替え (準備中)">
      <span class="btn-icon" aria-hidden="true">⚠️</span>ハザード表示
    </button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <button id="install-hint" type="button" hidden>このアプリをホーム画面に追加してオフラインでも使えるようにする</button>

  <script src="./vendor/leaflet/leaflet.js"></script>
  <script src="./js/config.js"></script>
  <script src="./js/map.js"></script>
  <script src="./js/layers.js"></script>
  <script src="./js/locate.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/sw-register.js"></script>
</body>
</html>
