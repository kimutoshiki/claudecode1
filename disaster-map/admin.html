<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>境界描画 - 有楽自治会 防災マップ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="./vendor/leaflet-geoman/leaflet-geoman.css">
  <style>
    html, body { margin: 0; height: 100%; font-family: sans-serif; }
    body { display: flex; flex-direction: column; }
    header { background: #0b5394; color: #fff; padding: 12px 16px; font-weight: 700; }
    header .sub { font-size: 13px; font-weight: 400; opacity: 0.9; }
    main { flex: 1; position: relative; }
    #map { position: absolute; inset: 0; }
    .toolbar { padding: 10px; background: #eee; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .toolbar button { padding: 10px 16px; font-size: 15px; font-weight: 700; border: 2px solid #073a6b; background: #0b5394; color: #fff; border-radius: 8px; cursor: pointer; }
    .toolbar button.secondary { background: #fff; color: #0b5394; }
    .status { font-size: 14px; color: #333; }
    .status.error { color: #c62828; font-weight: 700; }
    .help { font-size: 13px; color: #555; padding: 0 10px 8px; background: #eee; }
  </style>
</head>
<body>
  <header>
    境界描画 (管理用)
    <div class="sub">地図上で有楽自治会の範囲を順にクリックしてポリゴンを作り、GeoJSON をダウンロードしてください。</div>
  </header>
  <div class="toolbar">
    <button id="btn-load" class="secondary" type="button">既存の境界を読み込む</button>
    <button id="btn-download" type="button">GeoJSON をダウンロード</button>
    <span id="status" class="status">左上のツールバーから多角形ツールを選んで描画できます。</span>
  </div>
  <div class="help">
    使い方: 左上の多角形アイコンをクリック → 地図を順にクリックして頂点を置く → 最後にダブルクリックで確定 →
    「GeoJSON をダウンロード」 → 取得したファイルを <code>data/yuraku-boundary.geojson</code> に置き換えて Git にコミット・push してください。
  </div>
  <main><div id="map"></div></main>

  <script src="./vendor/leaflet/leaflet.js"></script>
  <script src="./vendor/leaflet-geoman/leaflet-geoman.min.js"></script>
  <script src="./js/config.js"></script>
  <script src="./js/admin.js"></script>
</body>
</html>
